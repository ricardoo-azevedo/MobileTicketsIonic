<ion-header>
  <ion-toolbar>
    <ion-title>Atendente</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-card>
    <ion-card-header>
      <ion-title>Chamar Senha</ion-title>
    </ion-card-header>

    <ion-card-content>

      <ion-item>
        <ion-label>Guichê</ion-label>
        <ion-input type="number" [(ngModel)]="guiche"></ion-input>
      </ion-item>

      <ion-button expand="block" (click)="chamarSenha()">
        Chamar Próximo
      </ion-button>
      <p *ngIf="ultimaChamada">
        Última chamada: {{ ultimaChamada }}
      </p>
    </ion-card-content>
  </ion-card>

</ion-content>
