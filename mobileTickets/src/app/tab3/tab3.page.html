<ion-header>
  <ion-toolbar>
    <ion-title>Painel</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <!-- PAINEL -->
  <ion-card>
    <ion-card-header>
      <ion-title>Últimas Chamadas</ion-title>
    </ion-card-header>

<!-- eu preciso que alguem transforme essa  essas ultimas 5 chamadas em um log mesmo, tipo um hisotrico real, to tentando fazer com auxilio de ia mas ela ja cansou tadinha-->

    <ion-card-content>
      <ion-list>
        <ion-item *ngFor="let s of service.painel">
          {{ s.codigo }} - Guichê {{ s.guiche }}
        </ion-item>
      </ion-list>
    </ion-card-content>
  </ion-card>

  <!-- RELATÓRIO -->
  <ion-card>
    <ion-card-header>
      <ion-title>Relatório</ion-title>
    </ion-card-header>

    <ion-card-content>
      <ion-item>Total: {{ service.getRelatorio().total }}</ion-item>
      <ion-item>Atendidas: {{ service.getRelatorio().atendidas }}</ion-item>
      <ion-item>SP: {{ service.getRelatorio().SP }}</ion-item>
      <ion-item>SG: {{ service.getRelatorio().SG }}</ion-item>
      <ion-item>SE: {{ service.getRelatorio().SE }}</ion-item>
    </ion-card-content>
  </ion-card>

</ion-content>
